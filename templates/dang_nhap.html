<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - PC Care Admin</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#111827;
        }

        .login-container{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.1);
            width:100%;
            max-width:400px;
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo-icon{
            font-size:48px;
            color:#3b82f6;
            margin-bottom:10px;
        }

        .logo h1{
            font-size:24px;
            font-weight:800;
            color:#1f2937;
            margin-bottom:5px;
        }

        .logo p{
            color:#6b7280;
            font-size:14px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
            color:#374151;
            font-size:14px;
        }

        .form-group input{
            width:100%;
            padding:12px 16px;
            border:2px solid #e5e7eb;
            border-radius:10px;
            font-size:14px;
            transition:all 0.3s ease;
        }

        .form-group input:focus{
            outline:none;
            border-color:#3b82f6;
            box-shadow:0 0 0 3px rgba(59,130,246,0.1);
        }

        .btn-login{
            width:100%;
            padding:14px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.3s ease;
            margin-bottom:20px;
        }

        .btn-login:hover{
            background:#2563eb;
            transform:translateY(-1px);
        }

        .default-account{
            background:#f8fafc;
            padding:15px;
            border-radius:10px;
            text-align:center;
            font-size:13px;
            color:#6b7280;
        }

        .default-account strong{
            color:#3b82f6;
        }

        .alert{
            padding:12px 16px;
            border-radius:8px;
            margin-bottom:20px;
            font-size:14px;
        }

        .alert-danger{
            background:#fee2e2;
            color:#dc2626;
            border-left:4px solid #ef4444;
        }

        .remember-me{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:20px;
        }

        .remember-me input[type="checkbox"]{
            width:16px;
            height:16px;
        }

        .remember-me label{
            font-size:14px;
            color:#6b7280;
            cursor:pointer;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🔧</div>
            <h1>PC Care Admin</h1>
            <p>Hệ thống quản lý dịch vụ máy tính</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="tai_khoan">Tài khoản</label>
                <input type="text" id="tai_khoan" name="tai_khoan" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="mat_khau">Mật khẩu</label>
                <input type="password" id="mat_khau" name="mat_khau" required>
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Ghi nhớ đăng nhập</label>
            </div>
            
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        
        <div class="default-account">
            Tài khoản mặc định: <strong>admin</strong> / <strong>admin123</strong>
        </div>
    </div>
</body>
</html>
